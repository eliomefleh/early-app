<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Early — Sleep Accountability</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#534AB7;--pl:#EEEDFE;--pm:#AFA9EC;--p8:#3C3489;--tl:#1D9E75;--tlp:#E1F5EE;--tl8:#085041;--bg:#ffffff;--bg2:#f5f5f5;--t1:#1a1a1a;--t2:#666666;--bd:#e5e5e5;--rlg:12px;--rmd:8px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#2a2a2a;--t1:#f0f0f0;--t2:#999999;--bd:#3a3a3a;--pl:#2a2660;--p8:#AFA9EC}}
html,body{height:100%;background:#f0eff8}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:flex-start;padding:16px 0 32px;min-height:100vh}
.phone{width:100%;max-width:390px;background:var(--bg);border-radius:40px;overflow:hidden;display:flex;flex-direction:column;min-height:750px;box-shadow:0 8px 40px rgba(83,74,183,0.15)}
.screen{display:none;flex-direction:column;min-height:750px}
.screen.on{display:flex}
.sbar{padding:16px 22px 6px;display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.sbar-time{font-weight:600;font-size:15px;color:var(--t1)}
.content{flex:1;padding:22px 20px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.nav{display:flex;border-top:1px solid var(--bd);padding:10px 0 20px;background:var(--bg)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--t2);cursor:pointer;padding:4px 0;transition:color .15s}
.ni.on{color:var(--p)}
